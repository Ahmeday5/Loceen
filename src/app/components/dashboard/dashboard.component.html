<div class="dashboard">

          <div class="col">
            <div class="card">
              <div class="card-body d-flex justify-content-between align-items-center">
                <div class="icon-container">
                  <i class="fa-solid fa-sack-dollar"></i>
                </div>
                <div class="text-content mt-3">
                  <h5 class="card-title">251.26.110</h5>
                  <h5 class="card-title">النقدية والبنوك</h5>
                </div>
              </div>
            </div>
          </div>
          <div class="col">
            <div class="card">
              <div class="card-body d-flex justify-content-between align-items-center">

                  <i class="fa-solid fa-money-bill-trend-up"></i>

            </div>
          </div>
          <div class="col">

              <div class="card-body d-flex justify-content-between align-items-center">

                  <i class="fa-solid fa-file-invoice-dollar"></i>
                </div>
                <div class="text-content mt-3">
                  <h5 class="card-title">35.250.110</h5>
                  <h5 class="card-title">المصروفات</h5>
                </div>
              </div>
            </div>
          </div>
          <div class="col">
            <div class="card">
              <div class="card-body d-flex justify-content-between align-items-center">
                <div class="icon-container">
                  <i class="fa-solid fa-hand-holding-dollar"></i>
                </div>
                <div class="text-content mt-3">
                  <h5 class="card-title">0.000</h5>
                  <h5 class="card-title">الصافي</h5>
                </div>
              </div>
            </div>
          </div>
          <div class="col">
            <div class="card">
              <div class="card-body d-flex justify-content-between align-items-center">
                <div class="icon-container">
                  <i class="fa-solid fa-users"></i>
                </div>
                <div class="text-content mt-3">

                </div>
              </div>

            <div class="card">
              <div class="card-body d-flex justify-content-between align-items-center">

                  <i class="fa-solid fa-rotate"></i>
                </div>
                <div class="text-content mt-3">
                  <h5 class="card-title">251.26.110</h5>
                  <h5 class="card-title">المبيعات</h5>
                </div>
              </div>
            </div>

    <!----------------- chart --------------------->
    <div class="row g-4 cards-chart">
      <!-- شارت المبيعات والأرباح -->
      <div class="col-lg-8 col-md-12">
        <div class="card shadow-sm border-0 rounded-4 overflow-hidden h-100">
          <div class="card-header text-white text-center py-3" style="background: var(--main-color);">
            <h5 class="mb-0 fw-bold">المبيعات والأرباح الشهرية</h5>
          </div>
          <div class="card-body p-3">
            <canvas #salesChart height="150"></canvas>
          </div>
        </div>
      </div>

      <!-- شارت المصروفات -->
      <div class="col-lg-4 col-md-12">
        <div class="card shadow-sm border-0 rounded-4 overflow-hidden h-100">
          <div class="card-header bg-danger text-white text-center py-3">
            <h5 class="mb-0 fw-bold">توزيع المصروفات</h5>
          </div>
          <div class="card-body p-3 d-flex justify-content-center align-items-center">
            <canvas #expensesChart height="100" width="100"></canvas>
          </div>
        </div>
      </div>

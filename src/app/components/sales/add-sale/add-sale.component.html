<div class="add-sale mt-5">

          </div>

                <label for="exampleFormControlInput1" class="form-label">الخدمة</label>
                <input type="text" class="form-control" id="exampleFormControlInput1" required>
              </div>
            </div>
            <div class="col-12 col-sm-12 col-md-4 col-lg col-xl">
              <div class="form-section">
                <label for="exampleFormControlInput1" class="form-label">نوع الخدمة</label>

            </div>

            </div>
            <div class="col-12 col-sm-12 col-md-6 col-lg col-xl">

            </div>
            <div class="col-12 col-sm-12 col-md-6 col-lg col-xl">
              <div class="form-section">
                <label for="exampleFormControlInput1" class="form-label">الإجمالي</label>
                <input type="number" class="form-control" id="exampleFormControlInput1" required>

          <div class="row mt-3">

            <div class="col-12">
              <div class="btns d-flex justify-content-center">
